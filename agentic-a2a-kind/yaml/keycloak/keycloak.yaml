# Upstream Keycloak (dev mode, in-memory H2, --import-realm) for the OBO lab.
# Realm `solo` (alice/field-fte) is imported from the keycloak-realm-import
# ConfigMap rendered by 02-keycloak.sh from yaml/keycloak/realm-solo.json.
# Dev posture only — not for production.
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: keycloak
spec:
  selector: { app: keycloak }
  ports:
    - { name: http, port: 80, targetPort: 8080 }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: keycloak
  namespace: keycloak
spec:
  serviceName: keycloak
  replicas: 1
  selector: { matchLabels: { app: keycloak } }
  template:
    metadata: { labels: { app: keycloak } }
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.3
          args: [start-dev, --import-realm]
          env:
            - { name: KC_BOOTSTRAP_ADMIN_USERNAME, value: admin }
            - { name: KC_BOOTSTRAP_ADMIN_PASSWORD, value: admin }
            - { name: KC_HTTP_RELATIVE_PATH, value: / }
            # Pin the issuer to the in-cluster URL so the `iss` claim is stable
            # regardless of how the token is minted (port-forward vs in-cluster).
            # This must match the controller's oidc.issuer. Backchannel-dynamic
            # lets the token endpoint still answer on localhost via port-forward.
            - { name: KC_HOSTNAME, value: "http://keycloak.keycloak.svc.cluster.local" }
            - { name: KC_HOSTNAME_STRICT, value: "false" }
            - { name: KC_HOSTNAME_BACKCHANNEL_DYNAMIC, value: "true" }
            - { name: KC_HEALTH_ENABLED, value: "true" }
          ports:
            - { containerPort: 8080, name: http }
          readinessProbe:
            httpGet: { path: /realms/master, port: 8080 }
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 60
          resources:
            requests: { cpu: 200m, memory: 512Mi }
            limits:   { cpu: 1,    memory: 1Gi }
          volumeMounts:
            - { name: realm-import, mountPath: /opt/keycloak/data/import, readOnly: true }
      volumes:
        - name: realm-import
          configMap: { name: keycloak-realm-import }
