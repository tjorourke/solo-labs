# The app's HTTPRoute. Lives in the app namespace (gwtest) and attaches to the
# Gateway across namespaces. During the migration this carries TWO parentRefs
# (OpenShift gateway + agentgateway) so both serve the app simultaneously for a
# zero-downtime cutover. Apply with: envsubst < 30-httproute.yaml | oc apply -f -
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hello
  namespace: gwtest
spec:
  parentRefs:
  - name: hello-gw            # OpenShift gateway
    namespace: openshift-ingress
  - name: hello-agw           # agentgateway (same namespace as the route)
  hostnames:
  - "${APP_HOST}"
  rules:
  - matches:
    - path: { type: PathPrefix, value: / }
    backendRefs:
    - name: hello
      port: 8080
