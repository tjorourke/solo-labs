# Gateway on the OSS agentgateway class. The controller renders a Deployment +
# Service named after the Gateway (vllm-gateway), which port-forward.sh and
# test.sh target on :80.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: vllm-gateway
  namespace: agentgateway-system
spec:
  gatewayClassName: agentgateway
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
