# Demo vLLM backend — the llm-d inference simulator. It speaks the
# OpenAI-compatible API and advertises a base model plus six mock LoRA
# adapters (math/science/social/humanities/law/general). The adapters are
# names only: no weights, no training. That is exactly what we need to prove
# the routing path — the Semantic Router picks an adapter name, the gateway
# forwards it, and the simulator echoes a completion tagged with that name.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-llama3-8b-instruct
  namespace: default
  labels:
    app: vllm-llama3-8b-instruct
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-llama3-8b-instruct
  template:
    metadata:
      labels:
        app: vllm-llama3-8b-instruct
    spec:
      containers:
        - name: vllm-sim
          image: ghcr.io/llm-d/llm-d-inference-sim:v0.5.0
          imagePullPolicy: IfNotPresent
          args:
            - --model
            - base-model
            - --port
            - "8000"
            - --max-loras
            - "6"
            - --lora-modules
            - '{"name": "math-expert"}'
            - '{"name": "science-expert"}'
            - '{"name": "social-expert"}'
            - '{"name": "humanities-expert"}'
            - '{"name": "law-expert"}'
            - '{"name": "general-expert"}'
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits:   { cpu: "1", memory: 512Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-llama3-8b-instruct
  namespace: default
  labels:
    app: vllm-llama3-8b-instruct
spec:
  type: ClusterIP
  selector:
    app: vllm-llama3-8b-instruct
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
