# L7 JWT authentication + authorization at the agentgateway waypoint.
#
# Policy 1 — jwtAuthentication (mode: Strict): every request through the
# waypoint must carry a token that validates against Keycloak's JWKS (fetched
# in-cluster via the backendRef). No token / bad token -> 401.
#
# Policy 2 — authorization: CEL over the validated claims. Any valid token may
# GET; DELETE additionally requires realm_access.roles to contain "admin".
# matchExpressions are OR'd; a request must satisfy at least one. -> alice
# (user) can read but not delete; bob (admin) can do both.
apiVersion: enterpriseagentgateway.solo.io/v1alpha1
kind: EnterpriseAgentgatewayPolicy
metadata:
  name: petshop-jwt
  namespace: petshop
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: petshop-waypoint
  traffic:
    jwtAuthentication:
      mode: Strict
      providers:
        - issuer: http://keycloak.keycloak.svc.cluster.local:8080/realms/petshop
          jwks:
            remote:
              backendRef:
                name: keycloak
                namespace: keycloak
                port: 8080
              jwksPath: /realms/petshop/protocol/openid-connect/certs
---
apiVersion: enterpriseagentgateway.solo.io/v1alpha1
kind: EnterpriseAgentgatewayPolicy
metadata:
  name: petshop-authz
  namespace: petshop
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: petshop-waypoint
  traffic:
    authorization:
      action: Allow
      policy:
        matchExpressions:
          - 'request.method == "GET"'
          - 'request.method == "DELETE" && "admin" in jwt.realm_access.roles'
