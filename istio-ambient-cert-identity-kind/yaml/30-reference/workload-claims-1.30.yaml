# ─────────────────────────────────────────────────────────────────────────────
# REFERENCE ONLY — DO NOT APPLY ON THIS CLUSTER.
#
# This is the Solo "CEL and workload-claims authorization" feature set on the
# Solo 1.30 line (ALPHA, Enterprise-licensed). This lab runs 1.29.3-solo, where
# the flag below is not available, so the manifests here are shown for the story
# and NOT applied by the Makefile or the README steps. They close the gap the
# 20-allow-payments step exposes: telling payments-blue and payments-green apart
# even though they share a ServiceAccount.
#
# How it works:
#   1. Enable per-workload certs on ztunnel:
#        helm ... ztunnel --set env.ENABLE_WORKLOAD_CLAIMS=true   (restart ztunnel)
#      ztunnel then requests a certificate PER POD (cache keyed by pod UID),
#      not one shared per-ServiceAccount cert.
#   2. Annotate each pod. istiod reads solo.io.security-claims/<key> at
#      certificate issuance and embeds it in the workload's mTLS cert, alongside
#      auto claims (istio.io.workload.name / .namespace / .pod). The SPIFFE URI
#      does NOT change (still sa/payments); the claims ride alongside it.
#   3. Authorize at L4 on the claim with a CEL when-clause over source.claims.
#      Enforced by ztunnel only, per hop, no waypoint. ('/' in the annotation
#      key becomes '.' in the claim key.)
#
# Fail-closed: a missing claim key is a CEL error, so an ALLOW rule that
# references it simply does not match. Grant with ALLOW on annotated workloads
# rather than DENY on the absence of a claim.
# ─────────────────────────────────────────────────────────────────────────────

# 1) payments-blue is annotated tier=gold  (patch onto the existing Deployment)
apiVersion: apps/v1
kind: Deployment
metadata: { name: payments-blue, namespace: identity-demo }
spec:
  template:
    metadata:
      annotations:
        solo.io.security-claims/tier: "gold"
---
# 2) payments-green is annotated tier=silver
apiVersion: apps/v1
kind: Deployment
metadata: { name: payments-green, namespace: identity-demo }
spec:
  template:
    metadata:
      annotations:
        solo.io.security-claims/tier: "silver"
---
# 3) allow ONLY the gold tier — now blue is in and green is out, at L4, even
#    though both are sa/payments. Impossible without workload claims.
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-payments-gold-only
  namespace: identity-demo
spec:
  selector:
    matchLabels: { app: backend }
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cert-identity/ns/identity-demo/sa/payments
      to:
        - operation:
            ports: ["8080"]
      when:
        - key: "source.claims['solo.io.security-claims.tier']"   # '/' -> '.'
          values: ["gold"]
# The auto-populated per-workload claims are also available, e.g.
#   source.claims['istio.io.workload.pod']  /  source.claims['istio.io.workload.name']
