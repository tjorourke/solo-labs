# L4 decision on WHERE the caller is, using a CEL when-clause — all evaluated by
# ztunnel, no waypoint. This allows any workload whose source namespace is
# petshop to reach petstore, so the cross-namespace warehouse-svc is denied.
#
# The when-key form (shown) and the from.source.namespaces form are equivalent
# at L4; the when clause is the general mechanism (any L4 attribute ztunnel
# knows: source.principal, source.namespace, source.ip, destination.ip,
# destination.port, connection.sni). The 1.30 workload-claims feature extends
# the same when clause to source.claims[...] from the certificate (yaml/30-reference).
#
#   equivalent, without a when clause:
#   rules:
#   - from: [{ source: { namespaces: ["petshop"] } }]
#     to:   [{ operation: { ports: ["8080"] } }]
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: l4-allow-petshop-namespace
  namespace: petshop
spec:
  selector:
    matchLabels: { app: petstore }
  action: ALLOW
  rules:
    - to:
        - operation:
            ports: ["8080"]
      when:
        - key: source.namespace
          values: ["petshop"]
