# The when-clause beat, allow-first: one ALLOW on petstore admits callers from
# TWO namespaces — petshop and warehouse. The cross-namespace caller completes
# requests, so the warehouse namespace draws itself in the Gloo UI Graph
# (~30s: 15s collector scrape + 15s UI refresh; use a small graph window).
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: l4-allow-petshop-namespace
  namespace: petshop
spec:
  selector: { matchLabels: { app: petstore } }
  action: ALLOW
  rules:
    - to: [{ operation: { ports: ["8080"] } }]
      when: [{ key: source.namespace, values: ["petshop", "warehouse"] }]
