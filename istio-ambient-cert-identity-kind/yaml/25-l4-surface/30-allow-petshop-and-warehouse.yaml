# Close the loop: widen the namespace ALLOW to admit warehouse too. One value
# in the when-clause — warehouse-svc flips from denied to 200, and (because it
# now completes requests) the warehouse namespace appears in the Gloo UI Graph
# within ~30s. The DENY on analytics still wins (DENY > ALLOW).
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: l4-allow-petshop-namespace
  namespace: petshop
spec:
  selector: { matchLabels: { app: petstore } }
  action: ALLOW
  rules:
    - to: [{ operation: { ports: ["8080"] } }]
      when: [{ key: source.namespace, values: ["petshop", "warehouse"] }]
