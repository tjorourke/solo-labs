# petstore — the petshop API everyone calls. Identity
# spiffe://cert-identity/ns/petshop/sa/petstore. It serves two operations that
# the lab treats very differently:
#   GET  /pets       list pets      — a read, allowed for any caller the L4/L7 policy lets in
#   DELETE /pets/ID  remove a pet   — a write, gated at L7 on a JWT role=admin claim (waypoint step)
# At L4 ztunnel only knows the caller's SPIFFE identity and the port; the
# method/path distinction (and the JWT) only exist once a waypoint is attached.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: petstore
  namespace: petshop
---
apiVersion: v1
kind: Service
metadata:
  name: petstore
  namespace: petshop
  labels: { app: petstore }
spec:
  selector: { app: petstore }
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      appProtocol: http     # tells ambient this port is HTTP (matters at the waypoint)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: petstore
  namespace: petshop
  labels: { app: petstore }
spec:
  replicas: 1
  selector:
    matchLabels: { app: petstore }
  template:
    metadata:
      labels: { app: petstore }
    spec:
      serviceAccountName: petstore
      containers:
        - name: api
          image: python:3.12-alpine
          command: ["python3","-u","-c"]
          args:
            - |
              import http.server, socketserver, json, os, re
              PETS = {"1":"Rex","2":"Whiskers","3":"Bubbles"}
              class H(http.server.BaseHTTPRequestHandler):
                  def _send(self, code, obj):
                      b=json.dumps(obj).encode()
                      self.send_response(code)
                      self.send_header("Content-Type","application/json")
                      self.send_header("Content-Length",str(len(b)))
                      self.end_headers(); self.wfile.write(b)
                  def do_GET(self):
                      self._send(200, {"served_by": os.environ.get("POD_NAME","?"),
                                       "op":"list", "pets": PETS})
                  def do_DELETE(self):
                      m=re.match(r"/pets/(\w+)", self.path)
                      pid=m.group(1) if m else "?"
                      self._send(200, {"served_by": os.environ.get("POD_NAME","?"),
                                       "op":"delete", "deleted": pid})
                  def log_message(self,*a): pass
              socketserver.TCPServer.allow_reuse_address=True
              srv=socketserver.ThreadingTCPServer(("0.0.0.0",8080),H)
              print("petstore listening on :8080"); srv.serve_forever()
          env:
            - name: POD_NAME
              valueFrom: { fieldRef: { fieldPath: metadata.name } }
          ports:
            - containerPort: 8080
          readinessProbe:
            tcpSocket: { port: 8080 }
            initialDelaySeconds: 2
            periodSeconds: 5
