apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-llm
  namespace: llm
  labels: { app: mock-llm }
spec:
  replicas: 1
  selector: { matchLabels: { app: mock-llm } }
  template:
    metadata:
      labels: { app: mock-llm }
    spec:
      containers:
        - name: mock-llm
          image: mock-llm:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: mock-llm
  namespace: llm
  labels: { app: mock-llm }
spec:
  selector: { app: mock-llm }
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      appProtocol: http
