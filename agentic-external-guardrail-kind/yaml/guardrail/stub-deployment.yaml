apiVersion: apps/v1
kind: Deployment
metadata:
  name: trustguard-stub
  namespace: extguard-demo
  labels:
    app: trustguard-stub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trustguard-stub
  template:
    metadata:
      labels:
        app: trustguard-stub
    spec:
      containers:
        - name: stub
          image: trustguard-stub:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: LOG_LEVEL
              value: INFO
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: trustguard-stub
  namespace: extguard-demo
spec:
  selector:
    app: trustguard-stub
  ports:
    - name: http
      port: 8080
      targetPort: 8080
