# Two HTTPRoutes attach to the same Gateway. The /public route forwards
# untouched; the /privileged route gets an AgentgatewayPolicy with extAuth
# attached so every call parks at hitl-extauth until approved.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mcp-public
  namespace: ops-tools
spec:
  parentRefs:
    - name: hitl-gateway
      namespace: agentgateway-system
  rules:
    - matches:
        - path: { type: PathPrefix, value: /public }
      backendRefs:
        - name: ops-tools
          port: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mcp-privileged
  namespace: ops-tools
spec:
  parentRefs:
    - name: hitl-gateway
      namespace: agentgateway-system
  rules:
    - matches:
        - path: { type: PathPrefix, value: /privileged }
      backendRefs:
        - name: ops-tools
          port: 8080
