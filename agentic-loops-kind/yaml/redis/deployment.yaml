# Redis — backs the ext-auth's per-session counters.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: runaway-containment
  labels: { app: redis }
spec:
  replicas: 1
  selector:
    matchLabels: { app: redis }
  template:
    metadata:
      labels: { app: redis }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              name: tcp
          readinessProbe:
            tcpSocket: { port: 6379 }
            periodSeconds: 3
          livenessProbe:
            tcpSocket: { port: 6379 }
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: runaway-containment
  labels: { app: redis }
spec:
  selector: { app: redis }
  ports:
    - name: tcp
      port: 6379
      targetPort: 6379
