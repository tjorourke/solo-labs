apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: jwt-issuer
  namespace: runaway-containment
rules:
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get", "list", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jwt-issuer
  namespace: runaway-containment
subjects:
  - kind: ServiceAccount
    name: jwt-issuer
    namespace: runaway-containment
roleRef:
  kind: Role
  name: jwt-issuer
  apiGroup: rbac.authorization.k8s.io
