# ONE Agent record in AgentRegistry. Both Deployments reference this by
# metadata.name. AR assigns the catalog tag (shown as `vlatest` in the
# UI) when no tag is set explicitly.
#
# Build + push the image first, then `arctl apply -f yaml/agent.yaml`:
#
#   arctl build ./agent --push --platform linux/amd64 \
#     --image <your-registry>/solofieldassistant:0.2.2
#   arctl apply -f yaml/agent.yaml
#
# --platform linux/amd64 is required if you're building on an Apple
# Silicon Mac. Bedrock AgentCore expects an amd64 layer set.
#
# Replace <your-registry> with the OCI registry your AR runtimes can pull
# from (ECR for AgentCore, any registry your cluster can reach for kagent).
apiVersion: ar.dev/v1alpha1
kind: Agent
metadata:
  name: solofieldassistant
spec:
  description: Answers questions about Solo.io products by calling the Solo Knowledge Base via MCP.
  modelProvider: bedrock
  modelName: us.anthropic.claude-haiku-4-5-20251001-v1:0
  source:
    image: <your-registry>/solofieldassistant:0.2.2
    repository:
      url: https://github.com/<you>/<repo>.git
      branch: main
      subfolder: kagent-agentcore-solo-kb/agent
