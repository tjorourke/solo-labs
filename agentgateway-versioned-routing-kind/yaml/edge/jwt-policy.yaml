# JWT-claim -> version routing input, the agentgateway way.
#
# agentgateway has no claimsToHeaders. Instead the JWT is validated and the
# `version` claim is projected into a header with a CEL transformation
# (value: "jwt.version"). phase: PreRouting runs both the JWT check and the
# transformation BEFORE route selection, so the HTTPRoute can match the header.
#
# mode: Optional -> a request with no token is allowed through (so the override
# and default paths still work); a present-but-invalid token is rejected.
#
# jwks.inline carries the JWKS literally, so the lab runs offline.
# scripts/04-routing.sh generates the RSA keypair, fills in __JWKS_JSON__, and
# scripts/mint-token.sh signs matching tokens.
apiVersion: enterpriseagentgateway.solo.io/v1alpha1
kind: EnterpriseAgentgatewayPolicy
metadata:
  name: jwt-version
  namespace: agentgateway-system
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: agentgateway-proxy
  traffic:
    phase: PreRouting
    jwtAuthentication:
      mode: Optional
      providers:
        - issuer: versioned-routing-lab
          audiences:
            - public-api
          jwks:
            inline: |
              __JWKS_JSON__
    transformation:
      request:
        set:
          - name: x-tenant-version
            value: "jwt.version"
