# petstore-v2 — a second version of the API for the waypoint routing step.
# Same inline app (it reports served_by: <pod-name>, so v2 responses are
# self-identifying), same ServiceAccount (identity does not change with
# routing), its own Service so an HTTPRoute can weight traffic between v1/v2.
apiVersion: v1
kind: Service
metadata:
  name: petstore-v2
  namespace: petshop
  labels: { app: petstore-v2 }
spec:
  selector: { app: petstore-v2 }
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      appProtocol: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: petstore-v2
  namespace: petshop
  labels: { app: petstore-v2 }
spec:
  replicas: 1
  selector:
    matchLabels: { app: petstore-v2 }
  template:
    metadata:
      labels: { app: petstore-v2 }
    spec:
      serviceAccountName: petstore
      containers:
        - name: api
          image: python:3.12-alpine
          command: ["python3","-u","-c"]
          args:
            - |
              import http.server, socketserver, json, os, re
              PETS = {"1":"Rex","2":"Whiskers","3":"Bubbles","4":"Nibbles (v2 preview)"}
              class H(http.server.BaseHTTPRequestHandler):
                  def _send(self, code, obj):
                      b=json.dumps(obj).encode()
                      self.send_response(code)
                      self.send_header("Content-Type","application/json")
                      self.send_header("Content-Length",str(len(b)))
                      self.end_headers(); self.wfile.write(b)
                  def do_GET(self):
                      self._send(200, {"served_by": os.environ.get("POD_NAME","?"),
                                       "op":"list", "pets": PETS})
                  def do_DELETE(self):
                      m=re.match(r"/pets/(\w+)", self.path)
                      pid=m.group(1) if m else "?"
                      self._send(200, {"served_by": os.environ.get("POD_NAME","?"),
                                       "op":"delete", "deleted": pid})
                  def log_message(self,*a): pass
              socketserver.TCPServer.allow_reuse_address=True
              srv=socketserver.ThreadingTCPServer(("0.0.0.0",8080),H)
              print("petstore-v2 listening on :8080"); srv.serve_forever()
          env:
            - name: POD_NAME
              valueFrom: { fieldRef: { fieldPath: metadata.name } }
          ports:
            - containerPort: 8080
          readinessProbe:
            tcpSocket: { port: 8080 }
            initialDelaySeconds: 2
            periodSeconds: 5
