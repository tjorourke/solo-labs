# Deploy the approved my-mcp tool server (word_count) onto the kagent runtime.
# On a Kagent runtime an MCP server is deployed as its own Deployment; the agent
# then auto-derives MCP_SERVERS_CONFIG from the MCP servers Ready on the runtime.
apiVersion: ar.dev/v1alpha1
kind: Deployment
metadata:
  name: my-mcp
spec:
  targetRef:  { kind: MCPServer, name: my-mcp }
  runtimeRef: { kind: Runtime,   name: kind-kagent }
