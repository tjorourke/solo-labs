# Upstream Keycloak Deployment for the agentgw-multi-cluster-kind lab.
#
# Why not bitnami/keycloak chart? Bitnami yanked the public `docker.io/
# bitnami/keycloak:*-debian-12-r*` images in 2025 (free-tier distribution
# shutdown). Switched to upstream `quay.io/keycloak/keycloak`, dev-mode,
# no Postgres (in-memory H2) — fine for a kind demo, not for prod.
#
# Realm `solo` is imported from a ConfigMap (keycloak-realm-import,
# rendered from yaml/keycloak/realm-solo.json by quick.sh Step 12) on
# first boot. Subsequent boots re-import idempotently.
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: keycloak
spec:
  selector: { app: keycloak }
  ports:
  - { name: http, port: 80, targetPort: 8080 }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: keycloak
  namespace: keycloak
spec:
  serviceName: keycloak
  replicas: 1
  selector: { matchLabels: { app: keycloak } }
  template:
    metadata: { labels: { app: keycloak } }
    spec:
      containers:
      - name: keycloak
        image: quay.io/keycloak/keycloak:26.3
        args: [start-dev, --import-realm]
        env:
        - { name: KC_BOOTSTRAP_ADMIN_USERNAME, value: admin }
        - { name: KC_BOOTSTRAP_ADMIN_PASSWORD, value: admin }
        - { name: KC_HTTP_RELATIVE_PATH, value: / }
        - { name: KC_HOSTNAME_STRICT, value: "false" }
        - { name: KC_HEALTH_ENABLED, value: "true" }
        ports:
        - { containerPort: 8080, name: http }
        readinessProbe:
          httpGet: { path: /realms/master, port: 8080 }
          initialDelaySeconds: 20
          periodSeconds: 5
          failureThreshold: 60
        resources:
          requests: { cpu: 200m, memory: 512Mi }
          limits:   { cpu: 1,    memory: 1Gi }
        volumeMounts:
        - { name: realm-import, mountPath: /opt/keycloak/data/import, readOnly: true }
      volumes:
      - name: realm-import
        configMap: { name: keycloak-realm-import }
