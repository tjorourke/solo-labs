# httpbin — standard connectivity smoke-test workload.
# Deploy to both clusters to verify mesh traffic and cross-cluster routing
# before layering in the agentgateway policies.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: httpbin
  namespace: ai-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: httpbin
  template:
    metadata:
      labels:
        app: httpbin
    spec:
      containers:
        - name: httpbin
          image: kong/httpbin:0.1.0
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: httpbin
  namespace: ai-demo
spec:
  selector:
    app: httpbin
  ports:
    - name: http
      port: 80
      targetPort: 80
---
# HTTPRoute — expose httpbin through the north-south agentgateway ingress.
# Access: curl http://<agw-ingress-LB-IP>:8080/get
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: httpbin
  namespace: ai-demo
spec:
  parentRefs:
    - name: agw-ingress
      namespace: agentgateway-system
      group: gateway.networking.k8s.io
      kind: Gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: httpbin
          port: 80
