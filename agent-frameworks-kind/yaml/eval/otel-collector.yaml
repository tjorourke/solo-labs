# A minimal OpenTelemetry Collector that receives OTLP from the crews and writes
# the spans to a file (otlp-json), which agentevals scores offline. The crews that
# bundle kagent-core (ADK, LangGraph, CrewAI) export here when their pods get
# OTEL_TRACING_ENABLED=true + OTEL_EXPORTER_OTLP_ENDPOINT.
apiVersion: v1
kind: Namespace
metadata:
  name: eval
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otelcol-config
  namespace: eval
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          http: { endpoint: 0.0.0.0:4318 }
          grpc: { endpoint: 0.0.0.0:4317 }
    exporters:
      file:
        path: /data/otlp.json
      debug:
        verbosity: basic
    service:
      pipelines:
        traces:
          receivers: [otlp]
          exporters: [file, debug]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: eval
  labels: { app: otel-collector }
spec:
  replicas: 1
  selector:
    matchLabels: { app: otel-collector }
  template:
    metadata:
      labels: { app: otel-collector }
    spec:
      containers:
        - name: otelcol
          image: otel/opentelemetry-collector-contrib:0.110.0
          args: ["--config=/etc/otelcol/config.yaml"]
          ports:
            - { containerPort: 4318, name: otlp-http }
            - { containerPort: 4317, name: otlp-grpc }
          volumeMounts:
            - { name: config, mountPath: /etc/otelcol }
            - { name: data, mountPath: /data }
        # busybox sidecar shares the data volume so the trace file can be read out
        # (the collector image is distroless: no shell, no tar for kubectl cp/exec).
        - name: reader
          image: busybox:1.36
          command: ["sh", "-c", "sleep infinity"]
          volumeMounts:
            - { name: data, mountPath: /data }
      volumes:
        - name: config
          configMap: { name: otelcol-config }
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: eval
  labels: { app: otel-collector }
spec:
  selector: { app: otel-collector }
  ports:
    - { name: otlp-http, port: 4318, targetPort: 4318 }
    - { name: otlp-grpc, port: 4317, targetPort: 4317 }
