# Two routes on the one gateway.
#
# llm-route   /v1/chat/completions -> the Anthropic backend (OpenAI-compatible
#             translation). Every crew's LLM client targets this.
# mcp-route   /mcp -> the k8s-ops MCP server in `incident`. Every crew's tool
#             calls land here. Lives in `incident` (same namespace as the Service)
#             so no ReferenceGrant is needed; it attaches to the gateway in
#             agentgateway-system because the listener allows routes from All.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: llm-route
  namespace: agentgateway-system
spec:
  parentRefs:
    - name: frameworks-gw
      namespace: agentgateway-system
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1/chat/completions
      backendRefs:
        - name: anthropic-llm
          namespace: agentgateway-system
          group: agentgateway.dev
          kind: AgentgatewayBackend
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mcp-route
  namespace: incident
spec:
  parentRefs:
    - name: frameworks-gw
      namespace: agentgateway-system
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /mcp
      backendRefs:
        - name: k8s-ops
          port: 8080
