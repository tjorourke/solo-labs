# The LLM backend: ai.provider.anthropic, the single-provider shape the prompt guard
# in 07-augment.sh targets. Agentgateway accepts OpenAI-compatible /v1/chat/completions
# and translates to Anthropic /v1/messages and back, so every framework can point a
# plain OpenAI client at the gateway and reach Claude. The Anthropic key lives in
# Secret `anthropic-secret` (key: Authorization); the gateway sends it as x-api-key.
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: anthropic-llm
  namespace: agentgateway-system
spec:
  ai:
    provider:
      anthropic:
        # Default model; clients send the same name (MODEL in lib.sh).
        model: claude-haiku-4-5
  policies:
    auth:
      secretRef:
        name: anthropic-secret
