# The legacy namespace — a client estate we deliberately leave on SIDECARS the
# whole way through. It plays two roles:
#   1. checkout — a sidecar HTTP client that calls catalog.petstore. Once catalog
#      moves behind a waypoint, this is the "mixed fleet" caller that proves the
#      Solo-only sidecar→waypoint interop: a sidecar routed through the waypoint
#      so the waypoint's L7 policy applies to it too.
#   2. fortio — a continuous load generator against catalog. Its error count is
#      the zero-downtime scoreboard across every migration cut and the rollback.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: checkout
  namespace: petstore-legacy
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout
  namespace: petstore-legacy
spec:
  replicas: 1
  selector:
    matchLabels: { app: checkout }
  template:
    metadata:
      labels: { app: checkout }
    spec:
      serviceAccountName: checkout
      containers:
        - name: checkout
          image: curlimages/curl:8.10.1
          command: ["/bin/sh", "-c", "sleep infinity"]
          resources:
            requests: { cpu: 10m, memory: 16Mi }
            limits: { memory: 64Mi }
---
# fortio load generator — drives catalog.petstore continuously. We read its
# report at each phase; a clean run is 100% 200s, which is the zero-downtime
# proof. Stays on a sidecar throughout so it is also a mixed-fleet caller.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fortio
  namespace: petstore-legacy
spec:
  replicas: 1
  selector:
    matchLabels: { app: fortio }
  template:
    metadata:
      labels: { app: fortio }
    spec:
      containers:
        - name: fortio
          image: fortio/fortio:latest
          command: ["fortio", "server"]
          ports:
            - containerPort: 8080
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits: { memory: 128Mi }
