# Step 3: keep the DestinationRule TRAFFIC POLICY, drop the subsets. The
# connection-pool and outlier-detection settings still apply at the waypoint;
# only the subset definitions go away, because the HTTPRoute now does the version
# split. Apply this, then delete the old catalog VirtualService and the
# subset-carrying DestinationRule (yaml/20-policies-sidecar/10-catalog-dr-vs.yaml).
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: catalog
  namespace: petstore
spec:
  host: catalog.petstore.svc.cluster.local
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        http1MaxPendingRequests: 100
        maxRequestsPerConnection: 10
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 10s
      baseEjectionTime: 30s
