# Step 2: the HTTPRoute that replaces the VirtualService + DestinationRule
# subset split. Its parentRef is the ORIGINAL catalog Service (Gateway-API mesh
# routing — the route attaches to the service every caller already addresses),
# and its backendRefs are the per-version Services. Shift the weights to move
# traffic; this is the exact knob Argo Rollouts drives for progressive delivery.
# The waypoint enforces it.
#
# Starts 100% v1 to match the VirtualService it replaces, so the cutover is a
# no-op for live traffic.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: catalog
  namespace: petstore
spec:
  parentRefs:
    - group: ""
      kind: Service
      name: catalog
      port: 80
  rules:
    - backendRefs:
        - name: catalog-v1
          port: 80
          weight: 100
        - name: catalog-v2
          port: 80
          weight: 0
