services:
  otel-collector:
    image: otel/opentelemetry-collector:latest
    # Host-side ports are bumped to 14317/14318 so they don't collide with
    # other OTLP collectors that conventionally bind 4317/4318 on the host
    # (e.g. a kagent helm install exposes its telemetry gateway on those
    # ports; a native otel-collector binary; an active `kubectl port-forward`).
    # The container still listens on 4317/4318 internally and the agent
    # reaches it via the compose network at `otel-collector:4318` — unchanged.
    # Only the host's visibility into the collector moves.
    ports:
      - "14317:4317"  # OTLP gRPC  (host 14317 -> container 4317)
      - "14318:4318"  # OTLP HTTP  (host 14318 -> container 4318)
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol/config.yaml
    command: ["--config", "/etc/otelcol/config.yaml"]
    networks:
      - agentregistry-network
  summarizer:
    image: localhost:5001/summarizer:latest
    build:
      context: .
      dockerfile: Dockerfile
    command: ["summarizer", "--local"]
    ports:
      - "8080:8080"
    environment:
      # TODO: remove kagent variables (currently required)
      - KAGENT_URL=placeholder
      - KAGENT_NAME=placeholder
      - KAGENT_NAMESPACE=placeholder
      - AGENT_NAME=summarizer
      - OTEL_SERVICE_NAME=summarizer
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - MODEL_PROVIDER=anthropic
      - MODEL_NAME=claude-haiku-4-5
      # MCP wiring: pass these through from the host's .env if present.
      # Set by `arctl init agent --local-mcp <path>` (or by the user editing
      # .env to add a remote MCP). Compose only forwards listed env vars,
      # so omitting these here means MCPs configured at runtime never reach
      # the agent process.
      - MCP_SERVERS_CONFIG
      - MCP_TERMINATE_ON_CLOSE
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - type: bind
        source: ./summarizer
        target: /config
    networks:
      - agentregistry-network

networks:
  agentregistry-network:
    driver: bridge
