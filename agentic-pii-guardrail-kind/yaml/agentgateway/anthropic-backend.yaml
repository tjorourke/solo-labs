# Anthropic provider — claude-haiku-4-5 by default (cheap + fast for a demo).
# The secret is created by 04-policy.sh from $ANTHROPIC_API_KEY so we never
# check a key into the repo.
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: anthropic
  namespace: agentgateway-system
spec:
  ai:
    provider:
      anthropic:
        model: claude-haiku-4-5-20251001
  policies:
    auth:
      secretRef:
        name: anthropic-secret
