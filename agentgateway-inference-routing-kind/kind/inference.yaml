kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: inference
# Disjoint subnets so this cluster can coexist with any other kind clusters
# on the same Docker host (10.10/10.20 are used by the multi-cluster lab).
networking:
  podSubnet: "10.30.0.0/16"
  serviceSubnet: "10.98.0.0/16"
nodes:
  - role: control-plane
  - role: worker
