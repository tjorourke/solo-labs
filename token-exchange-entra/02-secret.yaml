# For Entra, client_id / tenant_id / scope live ON the policy. Only the opaque
# secret value goes here; the key name must match clientSecretRef.key.
apiVersion: v1
kind: Secret
metadata:
  name: entra-gateway-secret
  namespace: agentgateway-system
type: Opaque
stringData:
  client_secret: "<entra-app-client-secret>"
