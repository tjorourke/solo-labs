apiVersion: apps/v1
kind: Deployment
metadata:
  name: policy-sync
  namespace: tool-curation
  labels: { app: policy-sync }
spec:
  replicas: 1
  selector:
    matchLabels: { app: policy-sync }
  template:
    metadata:
      labels: { app: policy-sync }
    spec:
      serviceAccountName: policy-sync
      containers:
        - name: policy-sync
          image: policy-sync:dev
          imagePullPolicy: IfNotPresent
          env:
            - name: POLICY_SYNC_NAMESPACE
              value: "tool-curation"
            - name: MANIFEST_CONFIGMAP
              value: "curation-manifest"
            - name: POLICY_NAME
              value: "mcp-tool-allowlist"
            - name: BACKEND_NAME
              value: "rogue-mcp-backend"
            - name: BACKEND_NAMESPACE
              value: "tool-curation"
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            periodSeconds: 15
