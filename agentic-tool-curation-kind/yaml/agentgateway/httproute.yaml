# One HTTPRoute pointing at the description-shim through an AgentgatewayBackend
# of type `mcp`. We need the AgentgatewayBackend (rather than a plain Service
# backendRef) so the MCP-aware tool-allowlist policy can targetRef it.
#
# The description-shim sits BETWEEN the gateway and the rogue-mcp upstream so
# the curated descriptions on tools/list don't depend on the upstream's
# (possibly poisoned) ones.
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: rogue-mcp-backend
  namespace: tool-curation
spec:
  mcp:
    targets:
      - name: rogue-mcp
        static:
          host: description-shim.tool-curation.svc.cluster.local
          port: 8080
          path: /mcp
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mcp-route
  namespace: tool-curation
spec:
  parentRefs:
    - name: curation-gateway
      namespace: agentgateway-system
  rules:
    - matches:
        - path: { type: PathPrefix, value: /mcp }
      backendRefs:
        - group: agentgateway.dev
          kind: AgentgatewayBackend
          name: rogue-mcp-backend
