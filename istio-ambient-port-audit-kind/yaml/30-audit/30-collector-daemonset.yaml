# The per-node collector. One pod per worker; each pod STREAMS its own
# node's ztunnel access logs (one follow=true log connection, matched by
# spec.nodeName) and merge-patches ONLY its own key in the report ConfigMap —
# on change, debounced, with a heartbeat so the key's `updated` stamp stays
# live. See collector/collector.py; build with scripts/build-collector.sh.
#
# No toleration for the control-plane taint: app pods cannot land there, so
# its ztunnel has nothing to report for the app namespace.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: port-audit-collector
  namespace: port-audit-system
  labels:
    app: port-audit-collector
spec:
  selector:
    matchLabels:
      app: port-audit-collector
  template:
    metadata:
      labels:
        app: port-audit-collector
    spec:
      serviceAccountName: port-audit-collector
      containers:
        - name: collector
          # Built locally by scripts/build-collector.sh and kind-loaded;
          # IfNotPresent so the node uses the loaded image and never pulls.
          image: port-audit-collector:v1
          imagePullPolicy: IfNotPresent
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: NS_APP
              value: port-audit
            - name: NS_AUDIT
              value: port-audit-system
            - name: REPORT_CM
              value: port-audit-report
            - name: HEARTBEAT_SECONDS
              value: "60"
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 128Mi
