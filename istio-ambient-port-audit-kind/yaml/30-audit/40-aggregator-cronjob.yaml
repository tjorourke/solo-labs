# The aggregator. Every minute it merges the per-node observations, reads the
# configured surface (Service ports + AuthorizationPolicy allowed ports) and
# writes the used/unused diff to the report.json key — the only key it owns.
# Same image as the collector; the command picks the aggregator entrypoint.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: port-audit-aggregator
  namespace: port-audit-system
spec:
  schedule: "* * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app: port-audit-aggregator
        spec:
          serviceAccountName: port-audit-aggregator
          restartPolicy: Never
          containers:
            - name: aggregator
              image: port-audit-collector:v1
              imagePullPolicy: IfNotPresent
              command: ["python3", "-u", "/aggregate.py"]
              env:
                - name: NS_APP
                  value: port-audit
                - name: NS_AUDIT
                  value: port-audit-system
                - name: REPORT_CM
                  value: port-audit-report
