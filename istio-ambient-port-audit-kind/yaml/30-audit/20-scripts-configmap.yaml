# The aggregator script, mounted into the CronJob. (The collector is its own
# image — collector/collector.py — because it holds a streaming connection
# and in-memory state; the aggregator stays shell + jq because it is a
# stateless one-shot roll-up.)
apiVersion: v1
kind: ConfigMap
metadata:
  name: port-audit-scripts
  namespace: port-audit-system
data:
  aggregate.sh: |
    #!/bin/sh
    # aggregate.sh — runs as a CronJob. Merges every node's observations, reads
    # the CONFIGURED surface (Service ports + AuthorizationPolicy allowed
    # ports), and writes the diff to the report.json key of the same
    # ConfigMap: per service, what is exposed, what is allowed, what is
    # actually used, what is not, and what got denied.
    set -eu
    NS_APP="${NS_APP:-port-audit}"
    NS_AUDIT="${NS_AUDIT:-port-audit-system}"
    CM="${REPORT_CM:-port-audit-report}"

    nodes=$(kubectl -n "$NS_AUDIT" get configmap "$CM" -o json \
      | jq -c '[.data | to_entries[] | select(.key != "report.json") | (.value | fromjson? // empty)]')
    svcs=$(kubectl -n "$NS_APP" get services -o json)
    pols=$(kubectl -n "$NS_APP" get authorizationpolicies.security.istio.io -o json)

    report=$(jq -nc --argjson nodes "$nodes" --argjson svcs "$svcs" --argjson pols "$pols" '
      # Union a per-node map-of-arrays field across all nodes.
      def union_map(f): reduce ($nodes[] | f | to_entries[]) as $e
        ({}; .[$e.key] = ((.[$e.key] // []) + $e.value | unique));
      (union_map(.services // {})) as $obs_svc |
      (union_map(.pods     // {})) as $obs_pod |
      (union_map(.denied   // {})) as $denied  |
      { generated: (now | todate),
        nodes_reporting: [$nodes[].node],
        services: [ $svcs.items[]
          | (.metadata.name) as $name
          | (.spec.selector.app // "") as $app
          | ("\(.metadata.name).\(.metadata.namespace).svc.cluster.local") as $fqdn
          | ([.spec.ports[].port] | sort) as $conf
          # Allowed ports = ports named by ALLOW AuthorizationPolicies whose
          # selector matches this Service selector app label (good enough for
          # app-labelled workloads, which is the convention here).
          | ([ $pols.items[]
               | select((.spec.action // "ALLOW") == "ALLOW")
               | select((.spec.selector.matchLabels.app // "-") == $app)
               | .spec.rules[]?.to[]?.operation.ports[]?
               | tonumber ] | unique) as $authz
          | ($obs_svc[$fqdn] // [] | sort) as $used
          | { service: $name,
              configured_service_ports: $conf,
              authz_allowed_ports: $authz,
              used_ports: $used,
              unused_ports: ($conf - $used),
              authz_allowed_never_used: ($authz - $used),
              denied_attempts: ($denied[$fqdn] // []),
              over_provisioned: ((($conf - $used) | length) > 0) } ],
        pods: $obs_pod }
    ')

    kubectl -n "$NS_AUDIT" patch configmap "$CM" --type=merge \
      -p "$(jq -n --arg v "$report" '{data: {"report.json": $v}}')" >/dev/null
    echo "report.json updated:"
    echo "$report" | jq .
