# Deploy the approved everything-server tool server (sum, echo, printenv, ...) onto
# the kagent runtime. Added to the agent AFTER it's first deployed, to show a tool
# appearing: deploy this, add it to the agent's spec.mcpServers, redeploy the agent.
apiVersion: ar.dev/v1alpha1
kind: Deployment
metadata:
  name: everything-server
spec:
  targetRef:  { kind: MCPServer, name: everything-server }
  runtimeRef: { kind: Runtime,   name: kind-kagent }
