apiVersion: ar.dev/v1alpha1
kind: Deployment
metadata:
  name: agentdemo
spec:
  targetRef:  { kind: Agent,   name: agentdemo }
  runtimeRef: { kind: Runtime, name: kind-kagent }
  # No env here on purpose — the model key is not hardcoded in the deploy. Deploy
  # this agent with ./scripts/deploy-agent-kagent.sh, which sources ANTHROPIC_API_KEY
  # into the kagent Agent CR from Secret/kagent-anthropic via env.valueFrom.secretKeyRef.
  # (OTel tracing is stamped in by the kagent controller for every agent it deploys;
  # MCP_SERVERS_CONFIG is derived by the registry from the MCP servers on the runtime.)
