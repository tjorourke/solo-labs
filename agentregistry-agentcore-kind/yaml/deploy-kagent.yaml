apiVersion: ar.dev/v1alpha1
kind: Deployment
metadata:
  name: agentdemo
spec:
  targetRef:  { kind: Agent,   name: agentdemo }
  runtimeRef: { kind: Runtime, name: kind-kagent }
  # The agent is a BYO/ADK image whose own LiteLlm reads ANTHROPIC_API_KEY from its
  # environment (kagent's default ModelConfig is for kagent-native models, not this
  # agent). The Deployment env is a literal string map (no secretKeyRef), so the key
  # must be injected at deploy time:  envsubst < yaml/deploy-kagent.yaml | arctl apply -f -
  # connect.sh sources it from .env.local / the secrets file, so it's never committed.
  env:
    ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
    # OTel tracing is NOT set here: the kagent controller stamps OTEL_TRACING_ENABLED
    # + the collector endpoint into every agent it deploys (03-kagent.sh enables it
    # chart-wide). Spans land in ClickHouse and show in the Enterprise UI Tracing tab.
