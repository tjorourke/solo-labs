apiVersion: ar.dev/v1alpha1
kind: Deployment
metadata:
  name: agentdemo
spec:
  targetRef:  { kind: Agent,   name: agentdemo }
  runtimeRef: { kind: Runtime, name: kind-kagent }
  # No env needed: the agent's anthropic key comes from kagent's default
  # ModelConfig (apiKeySecret: kagent-anthropic), configured at install time.
  # So this deploys with a plain `arctl apply -f yaml/deploy-kagent.yaml`.
