# Upstream Keycloak (dev mode, in-memory H2, --import-realm) for the OBO lab.
# Realm `solo` (alice/field-fte) is imported from the keycloak-realm-import
# ConfigMap rendered by 02-keycloak.sh from yaml/keycloak/realm-solo.json.
# Dev posture only — not for production.
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: keycloak
spec:
  selector: { app: keycloak }
  ports:
    - { name: http, port: 80, targetPort: 8080 }
    # 8080 too: the browser-consistent issuer is keycloak.localtest.me:8080, which
    # the controller/oauth2-proxy reach via a hostAlias -> this ClusterIP:8080.
    - { name: http-8080, port: 8080, targetPort: 8080 }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: keycloak
  namespace: keycloak
spec:
  serviceName: keycloak
  replicas: 1
  selector: { matchLabels: { app: keycloak } }
  template:
    metadata: { labels: { app: keycloak } }
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.3
          args: [start-dev, --import-realm]
          env:
            - { name: KC_BOOTSTRAP_ADMIN_USERNAME, value: admin }
            - { name: KC_BOOTSTRAP_ADMIN_PASSWORD, value: admin }
            - { name: KC_HTTP_RELATIVE_PATH, value: / }
            # Issuer = keycloak.localtest.me:8080 so the SAME iss works in the
            # browser (keycloak.localtest.me resolves to 127.0.0.1 via public DNS,
            # no /etc/hosts) and in-cluster (controller/oauth2-proxy via a hostAlias).
            # This is what lets the kagent UI's OIDC login complete on kind.
            # Backchannel-dynamic lets ask.sh still mint via the in-cluster svc.
            - { name: KC_HOSTNAME, value: "http://keycloak.localtest.me:8080" }
            - { name: KC_HOSTNAME_STRICT, value: "false" }
            - { name: KC_HOSTNAME_BACKCHANNEL_DYNAMIC, value: "true" }
            - { name: KC_HEALTH_ENABLED, value: "true" }
          ports:
            - { containerPort: 8080, name: http }
          readinessProbe:
            httpGet: { path: /realms/master, port: 8080 }
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 60
          resources:
            requests: { cpu: 200m, memory: 512Mi }
            limits:   { cpu: 1,    memory: 1Gi }
          volumeMounts:
            - { name: realm-import, mountPath: /opt/keycloak/data/import, readOnly: true }
      volumes:
        - name: realm-import
          configMap: { name: keycloak-realm-import }
