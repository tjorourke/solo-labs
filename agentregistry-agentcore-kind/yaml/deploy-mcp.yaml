# Deploy the approved MCP tool servers onto the kagent runtime. On a Kagent-type
# runtime the agent deploy does NOT bring its MCP servers up — they must be
# deployed first, each as its own Deployment (targetRef.kind: MCPServer). The
# registry then auto-derives the agent's MCP_SERVERS_CONFIG from these (an MCP
# server with no Ready Deployment is silently skipped, leaving the agent with
# only its local tools). The kagent MCPServer the registry creates is named
# demo-<server> and is already labelled for the agentgateway waypoint.
apiVersion: ar.dev/v1alpha1
kind: Deployment
metadata:
  name: everything-server
spec:
  targetRef:  { kind: MCPServer, name: demo/everything-server }
  runtimeRef: { kind: Runtime,   name: kind-kagent }
---
apiVersion: ar.dev/v1alpha1
kind: Deployment
metadata:
  name: my-mcp
spec:
  targetRef:  { kind: MCPServer, name: demo/my-mcp }
  runtimeRef: { kind: Runtime,   name: kind-kagent }
