# NodePorts on the kind node so the AgentRegistry daemon (a Docker container,
# outside the cluster) can reach two in-cluster services:
#   - Keycloak (30080): the daemon's OIDC discovery + token validation, paired
#     with the socat issuer-alias container (04-daemon.sh).
#   - kagent controller (30083): the Kagent runtime's kagentUrl, where the daemon
#     creates agents (forwarding the caller's Keycloak bearer).
apiVersion: v1
kind: Service
metadata:
  name: keycloak-nodeport
  namespace: keycloak
spec:
  type: NodePort
  selector: { app: keycloak }
  ports:
    - { name: http, port: 80, targetPort: 8080, nodePort: 30080 }
---
apiVersion: v1
kind: Service
metadata:
  name: kagent-controller-nodeport
  namespace: kagent
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: kagent-enterprise
    app.kubernetes.io/component: controller
    app.kubernetes.io/instance: kagent
  ports:
    - { name: controller, port: 8083, targetPort: 8083, nodePort: 30083 }
