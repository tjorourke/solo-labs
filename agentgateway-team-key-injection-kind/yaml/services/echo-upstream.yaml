apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-upstream
  namespace: teamkey-demo
  labels: { app: echo-upstream }
spec:
  replicas: 1
  selector: { matchLabels: { app: echo-upstream } }
  template:
    metadata: { labels: { app: echo-upstream } }
    spec:
      containers:
        - name: echo
          image: echo-upstream:dev
          imagePullPolicy: IfNotPresent
          ports: [{ name: http, containerPort: 8080 }]
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: echo-upstream
  namespace: teamkey-demo
spec:
  selector: { app: echo-upstream }
  ports: [{ name: http, port: 8080, targetPort: 8080 }]
