apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-idp
  namespace: teamkey-demo
  labels: { app: mock-idp }
spec:
  replicas: 1
  selector: { matchLabels: { app: mock-idp } }
  template:
    metadata: { labels: { app: mock-idp } }
    spec:
      containers:
        - name: idp
          image: mock-idp:dev
          imagePullPolicy: IfNotPresent
          ports: [{ name: http, containerPort: 8080 }]
          env:
            - { name: ISSUER, value: "https://mock-idp.teamkey.demo" }
            - { name: AUDIENCE, value: "agentgateway" }
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: mock-idp
  namespace: teamkey-demo
spec:
  selector: { app: mock-idp }
  ports: [{ name: http, port: 8080, targetPort: 8080 }]
