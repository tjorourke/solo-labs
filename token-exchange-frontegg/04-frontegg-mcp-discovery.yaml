# Route-level JWT validation + MCP OAuth discovery, validating Frontegg-issued
# tokens. Supported drop-in: Frontegg is a standard OIDC provider, so this is
# the same shape as the article's discovery section with Frontegg URLs.
#
# Attach to the HTTPRoute (acme-mcp from the article's shared backend file), not
# the backend. The HTTPRoute also needs the two .well-known match paths added
# alongside the MCP path for discovery to resolve.
apiVersion: enterpriseagentgateway.solo.io/v1alpha1
kind: EnterpriseAgentgatewayPolicy
metadata:
  name: frontegg-mcp-discovery
  namespace: agentgateway-system
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: acme-mcp
  traffic:
    jwtAuthentication:
      mode: Strict
      providers:
        - issuer: https://acme.frontegg.com        # confirm against the OIDC Endpoints panel
          audiences:
            - <frontegg-app-id-or-client-id>       # Frontegg aud = clientId or appId
          jwks:
            remote:
              backendRef:
                name: frontegg-jwks
                group: agentgateway.dev
                kind: AgentgatewayBackend
              jwksPath: /.well-known/jwks.json
      mcp:
        # No provider hint: the mcp.provider enum only accepts Auth0 / Keycloak
        # (verified live against the CRD). Frontegg has no hint, like Okta in the
        # article's table, so the field is omitted.
        resourceMetadata:
          resource: https://agentgateway.acme.io/acme/mcp
          scopesSupported:
            - mcp:invoke
          bearerMethodsSupported:
            - header
            - body
            - query
