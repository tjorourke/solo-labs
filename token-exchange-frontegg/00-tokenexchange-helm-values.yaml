# enterprise-agentgateway Helm values (chart v2026.6.0).
# Install-time token-exchange server + validators, with the inbound validators
# pointed at Frontegg's JWKS. This is the leg Frontegg supports cleanly.
#
# Confirm the JWKS URL against Environment -> Authentication -> SSO -> Identity
# Provider -> OpenID Connect Endpoints. Frontegg hosted login typically serves
# keys at https://<subdomain>.frontegg.com/.well-known/jwks.json
tokenExchange:
  enabled: true
  issuer: "enterprise-agentgateway.agentgateway-system.svc.cluster.local:7777"
  tokenExpiration: 24h
  subjectValidator:            # validates the inbound Frontegg user token
    validatorType: remote
    remoteConfig:
      url: "https://acme.frontegg.com/.well-known/jwks.json"
  actorValidator:              # validates the gateway's own SA token
    validatorType: k8s
  apiValidator:                # guards the exchange/elicitation API
    validatorType: remote
    remoteConfig:
      url: "https://acme.frontegg.com/.well-known/jwks.json"
  # No elicitation block needed for the core swap: the gateway STS validates the
  # Frontegg token (above) and mints the exchanged token itself. Frontegg never
  # performs an RFC 8693 exchange, so its lack of that grant is irrelevant here.
  # Proven with Keycloak in ../token-exchange-keycloak-kind/. See README.
