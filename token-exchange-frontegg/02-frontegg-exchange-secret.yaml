# NON-FUNCTIONAL against Frontegg's hosted endpoint. On record for shape only.
#
# This is the generic elicitation Secret the article uses for Keycloak/Auth0/Okta.
# Frontegg's hosted /oauth/token does NOT honour the RFC 8693 token-exchange
# grant, so the exchange POST built from this Secret will be rejected at request
# time. Kept here so the intended shape is documented. See README.
apiVersion: v1
kind: Secret
metadata:
  name: frontegg-token-exchange
  namespace: agentgateway-system
type: Opaque
stringData:
  type: oauth
  app_id: frontegg
  client_id: "<frontegg-client-id>"
  client_secret: "<frontegg-client-secret>"
  authorize_url: "https://acme.frontegg.com/oauth/authorize"
  access_token_url: "https://acme.frontegg.com/oauth/token"   # no token-exchange grant here
  scopes: "openid mcp:invoke offline_access"
  redirect_uri: "https://agentgateway.acme.io/age/elicitations"
