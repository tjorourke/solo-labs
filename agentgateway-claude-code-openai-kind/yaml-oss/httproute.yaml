# Claude Code calls POST /v1/messages (the Anthropic Messages API). Routing that
# path to an OpenAI-backed AgentgatewayBackend is what triggers the
# Messages -> chat-completions translation; the response is translated back to
# Anthropic format on the way out.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: claude-to-openai
  namespace: agentgateway-system
spec:
  parentRefs:
    - name: agentgateway-proxy
      namespace: agentgateway-system
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1/messages
      backendRefs:
        - name: openai
          namespace: agentgateway-system
          group: agentgateway.dev
          kind: AgentgatewayBackend
