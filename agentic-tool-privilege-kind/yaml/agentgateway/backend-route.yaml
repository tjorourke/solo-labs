# The MCP backend + route. The AgentgatewayBackend (kind mcp) is required so the
# per-tool authorization policy can target it — mcp.authorization only attaches
# to an AgentgatewayBackend whose spec.mcp is populated.
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: mock-db-mcp
  namespace: mock-db
spec:
  mcp:
    targets:
      - name: mock-db
        static:
          host: mock-db.mock-db.svc.cluster.local
          port: 8080
          path: /mcp
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mock-db-route
  namespace: mock-db
spec:
  parentRefs:
    - name: db-gateway
      namespace: agentgateway-system
  rules:
    - matches:
        - path: { type: PathPrefix, value: /mcp }
      backendRefs:
        - group: agentgateway.dev
          kind: AgentgatewayBackend
          name: mock-db-mcp
