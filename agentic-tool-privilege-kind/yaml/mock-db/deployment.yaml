apiVersion: v1
kind: Namespace
metadata:
  name: mock-db
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-db
  namespace: mock-db
  labels: { app: mock-db }
spec:
  replicas: 1
  selector: { matchLabels: { app: mock-db } }
  template:
    metadata:
      labels: { app: mock-db }
    spec:
      containers:
        - name: mock-db
          image: mock-db:dev
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http, containerPort: 8080 }
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            periodSeconds: 3
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: mock-db
  namespace: mock-db
  labels: { app: mock-db }
spec:
  selector: { app: mock-db }
  ports:
    - { name: http, port: 8080, targetPort: 8080, appProtocol: http }
