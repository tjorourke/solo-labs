apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: leaky-echo
  namespace: agentgateway-system
spec:
  parentRefs:
  - name: agentgateway-proxy
  hostnames:
  - api.local
  rules:
  - matches:
    - path: { type: PathPrefix, value: /v1 }
    backendRefs:
    - name: leaky-echo
      port: 80
