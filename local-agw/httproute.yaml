apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: claude-route
  namespace: agentgateway-system
spec:
  parentRefs:
    - name: agentgateway
      namespace: agentgateway-system
  rules:
    - matches:
      - path:
          type: PathPrefix
          value: /
      filters:
        # Force identity encoding upstream. Works around agentgateway pre-#1645
        # (≤ 2.3.2) leaking content-encoding: gzip onto a decompressed SSE body,
        # which causes the Claude CLI to drop the socket mid-stream.
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: Accept-Encoding
                value: identity
      backendRefs:
      - name: claude-with-fallback
        namespace: agentgateway-system
        group: agentgateway.dev
        kind: AgentgatewayBackend
