apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: pg-test-route
  namespace: agentgateway-system
spec:
  parentRefs:
    - name: pg-test-gw
      namespace: agentgateway-system
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: pg-prov-claude
          namespace: agentgateway-system
          group: agentgateway.dev
          kind: AgentgatewayBackend
