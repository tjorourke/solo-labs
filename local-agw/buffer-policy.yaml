apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: large-llm-body
  namespace: agentgateway-system
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: agentgateway
  frontend:
    http:
      # Default is 2Mi. Claude Code on Opus 4.7 (1M context) sends much larger
      # request bodies once context grows. AGW buffers the body to parse model
      # name / inject auth, and rejects with 503 "request was too large" past
      # the limit.
      maxBufferSize: 33554432
