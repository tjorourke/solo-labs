apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: claude-with-fallback
  namespace: agentgateway-system
spec:
  ai:
    groups:
      - providers:
          - name: corp-anthropic
            anthropic: {}
            policies:
              ai:
                routes:
                  '/v1/messages': Messages
                  '*': Passthrough
              auth:
                secretRef:
                  name: corp-anthropic-secret
      - providers:
          - name: personal-anthropic
            anthropic: {}
            policies:
              ai:
                routes:
                  '/v1/messages': Messages
                  '*': Passthrough
              auth:
                secretRef:
                  name: personal-anthropic-secret
