export CORP_API_KEY=sk-ant-YOUR_SOLO_CORP_KEY
export PERSONAL_API_KEY=sk-ant-YOUR_PERSONAL_MAX_KEY

kubectl create secret generic corp-anthropic-secret \
  -n agentgateway-system \
  --from-literal=Authorization="$CORP_API_KEY"

kubectl create secret generic personal-anthropic-secret \
  -n agentgateway-system \
  --from-literal=Authorization="$PERSONAL_API_KEY"

kubectl get secrets -n agentgateway-system
